name: Cypress Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ─── Testes de API ────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          spec: cypress/api_test/**/*.cy.js
          browser: electron
          headless: true

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-screenshots
          path: cypress/screenshots
          retention-days: 7

  # ─── Testes E2E (Frontend) ───────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          spec: cypress/e2e/**/*.cy.js
          browser: chrome
          headless: true

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: cypress/screenshots
          retention-days: 7
